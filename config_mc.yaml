env:
  n: 10
  max_steps: 1000
  step_penalty: -1
  collect_reward: 10.0
  goal_reward: 10.0
  goal_without_token_reward: 0.0

agent:
  algorithm: monte_carlo
  alpha: 0.05            # Lower alpha suits MC since updates are batch, not online
  gamma: 0.99
  exploration: epsilon_greedy
  epsilon: 1.0
  epsilon_decay: 0.9999
  min_epsilon: 0.05      # Keep some exploration; MC benefits from diverse trajectories
  temperature: 1.0
  temperature_decay: 1.0
  min_temperature: 0.1

train:
  save_dir: "runs/monte_carlo"
  n_episodes: 20000
  log_interval: 500
  seed: 42
