env:
  type: GridWorldWithWallsEnv
  n: 10
  wall_frac: 0.07        # Fraction of all possible edges that become walls
  seed_walls: 0          # Fixed seed → same walls every run (null = random)
  max_steps: 1000
  step_penalty: -1
  collect_reward: 10.0
  goal_reward: 20.0
  goal_without_token_reward: 0.0

agent:
  alpha: 0.1
  gamma: 0.99
  exploration: epsilon_greedy
  epsilon: 0.25
  epsilon_decay: 1.0
  min_epsilon: 0.01
  temperature: 4.0
  temperature_decay: 0.9999
  min_temperature: 0.01

train:
  save_dir: "runs/walls_exp1"
  n_episodes: 20000
  log_interval: 500
  seed: 42
