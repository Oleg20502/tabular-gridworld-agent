env:
  n: 10               # Grid size (NxN)
  max_steps: 400      # Max steps per episode before truncation (null = 4*n^2)
  step_penalty: -0.01
  collect_reward: 1.0
  goal_reward: 10.0
  goal_without_token_reward: 0.0

agent:
  alpha: 0.1          # Learning rate
  gamma: 0.99         # Discount factor
  epsilon: 0.1        # Initial exploration rate
  epsilon_decay: 1.0  # Multiplicative decay per episode (1.0 = no decay)
  min_epsilon: 0.01   # Minimum exploration rate

train:
  save_dir: "runs/exp1"
  n_episodes: 10000
  log_interval: 100
  seed: 42
